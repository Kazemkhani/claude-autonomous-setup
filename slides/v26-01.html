<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
        font-family: "Inter", "Helvetica Neue", sans-serif;
        color: #1f2937;
      }
      body {
        display: flex;
        flex-direction: column;
        padding: 72px 80px;
        justify-content: space-between;
        position: relative;
      }
      .ref-badge {
        position: absolute;
        top: 72px;
        right: 80px;
        border: 1.5px solid #e5e7eb;
        padding: 10px 18px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: #9ca3af;
        letter-spacing: 0.1em;
        line-height: 1.6;
        text-align: right;
      }
      .ref-badge strong {
        color: #10b981;
        display: block;
        font-size: 13px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      .tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: #10b981;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
      }
      .cost-pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        background: #f3f4f6;
        border: 1.5px solid #e5e7eb;
        padding: 12px 24px;
        align-self: flex-start;
      }
      .cost-pill .label {
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        color: #6b7280;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .cost-pill .value {
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        font-weight: 700;
        color: #10b981;
      }
      h1 {
        font-size: 88px;
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -0.04em;
        color: #111827;
      }
      h1 .em {
        color: #10b981;
      }
      .stack-diagram {
        display: flex;
        align-items: center;
        gap: 0;
        background: #f3f4f6;
        border: 1.5px solid #e5e7eb;
        padding: 20px 28px;
        flex-wrap: wrap;
        row-gap: 12px;
      }
      .stack-item {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        font-weight: 700;
        color: #1f2937;
        white-space: nowrap;
      }
      .stack-arrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        color: #10b981;
        margin: 0 12px;
        font-weight: 700;
      }
      .sub {
        font-size: 22px;
        font-weight: 300;
        color: #6b7280;
        line-height: 1.5;
        max-width: 780px;
      }
      .sub strong {
        color: #1f2937;
        font-weight: 700;
      }
      .foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1.5px solid #e5e7eb;
        padding-top: 20px;
      }
      .foot-handle {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: #6b7280;
        letter-spacing: 0.04em;
      }
      .foot-page {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: #d1d5db;
        letter-spacing: 0.1em;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="ref-badge">
      <strong>REF CARD</strong>
      v26 · Setup Guide<br />
      amirkazemkhani.com
    </div>
    <div class="tag">Voice Coding · Reference Card</div>
    <div class="hero">
      <div class="cost-pill">
        <span class="label">Monthly cost</span>
        <span class="value">$0</span>
      </div>
      <h1>My voice<br />coding<br /><span class="em">setup.</span></h1>
      <div class="stack-diagram">
        <span class="stack-item">AirPods</span>
        <span class="stack-arrow">→</span>
        <span class="stack-item">Whisper.cpp</span>
        <span class="stack-arrow">→</span>
        <span class="stack-item">Telegram</span>
        <span class="stack-arrow">→</span>
        <span class="stack-item">Claude</span>
        <span class="stack-arrow">→</span>
        <span class="stack-item">git</span>
      </div>
      <div class="sub">
        <strong>3 commands to start.</strong> Full wiring inside.<br />
        I code in the car, in the gym, on a walk.
      </div>
    </div>
    <div class="foot">
      <div class="foot-handle">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="foot-page">01 / 03</div>
    </div>
  </body>
</html>
