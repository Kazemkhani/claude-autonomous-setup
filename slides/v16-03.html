<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, "Inter", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #1e1b4b;
        color: #e0e7ff;
      }
      body {
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1300px;
        height: 1300px;
        background: radial-gradient(
          closest-side,
          rgba(139, 92, 246, 0.28),
          rgba(34, 211, 238, 0.16) 50%,
          transparent 75%
        );
        filter: blur(50px);
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      .eyebrow {
        font-size: 22px;
        color: #fbbf24;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        font-weight: 900;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 128px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -0.04em;
        margin-bottom: 32px;
        color: #fff;
      }
      h1 em {
        font-style: italic;
        background: linear-gradient(135deg, #fbbf24, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .sub {
        font-size: 30px;
        color: #c7d2fe;
        font-weight: 600;
        line-height: 1.4;
        max-width: 880px;
        margin: 0 auto 56px;
      }
      .sub strong {
        color: #fff;
        font-weight: 800;
      }
      .cta {
        display: inline-flex;
        align-self: center;
        align-items: center;
        gap: 14px;
        padding: 22px 48px;
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #1e1b4b;
        border-radius: 14px;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        box-shadow: 0 0 80px rgba(251, 191, 36, 0.5);
      }
      .cta::after {
        content: "→";
      }
      .foot {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        font-size: 18px;
        color: #6366f1;
      }
      .brand {
        font-weight: 700;
        color: #a5b4fc;
      }
      .page {
        font-weight: 700;
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="content">
      <div class="eyebrow">// the unfair advantage</div>
      <h1>Most devs are<br /><em>missing</em> these.</h1>
      <div class="sub">
        <strong>You can install all 5 in 10 minutes.</strong> Free. The setup
        guide walks every command.
      </div>
      <div class="cta">Read the guide</div>
    </div>
    <div class="foot">
      <div class="brand">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="page">03 / 03</div>
    </div>
  </body>
</html>
