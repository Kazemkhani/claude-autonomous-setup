<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, "Inter", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        background: #0d1117;
        color: #e6edf3;
        overflow: hidden;
      }
      body {
        padding: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .titlebar {
        height: 56px;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        display: flex;
        align-items: center;
        padding: 0 22px;
        gap: 10px;
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
      }
      .r {
        background: #ff5f57;
      }
      .y {
        background: #febc2e;
      }
      .g {
        background: #28c840;
      }
      .path {
        margin-left: 24px;
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        color: #7d8590;
      }
      .path span {
        color: #e6edf3;
      }
      .glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1100px;
        height: 1100px;
        background: radial-gradient(
          closest-side,
          rgba(63, 185, 113, 0.18),
          transparent 70%
        );
        filter: blur(50px);
      }
      .body {
        position: relative;
        z-index: 1;
        flex: 1;
        padding: 48px 64px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      .kicker {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #3fb950;
        text-transform: uppercase;
        margin-bottom: 24px;
        font-family: "JetBrains Mono", monospace;
      }
      .kicker::before {
        content: "// ";
      }
      h1 {
        font-size: 108px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -0.04em;
        margin-bottom: 32px;
        color: #e6edf3;
      }
      h1 em {
        font-style: italic;
        color: #58a6ff;
      }
      .sub {
        font-size: 28px;
        font-weight: 500;
        line-height: 1.45;
        color: #7d8590;
        max-width: 880px;
        margin: 0 auto 48px;
        font-family: "JetBrains Mono", monospace;
      }
      .sub strong {
        color: #e6edf3;
      }
      .cta {
        display: inline-flex;
        align-self: center;
        align-items: center;
        gap: 14px;
        padding: 24px 48px;
        background: #3fb950;
        color: #0d1117;
        border-radius: 10px;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 0.02em;
        font-family: "JetBrains Mono", monospace;
        box-shadow: 0 0 60px rgba(63, 185, 113, 0.5);
      }
      .cta::after {
        content: "→";
      }
      .footer {
        padding: 24px 64px;
        border-top: 1px solid #30363d;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        color: #7d8590;
        font-family: "JetBrains Mono", monospace;
      }
      .brand {
        color: #58a6ff;
        font-weight: 700;
      }
      .page {
        color: #3fb950;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
      <div class="path">main → <span>pipeline.md</span></div>
    </div>
    <div class="glow"></div>
    <div class="body">
      <div class="kicker">the result</div>
      <h1>30 minutes → <em>10 seconds.</em></h1>
      <div class="sub">
        <strong>What used to be 30 min of context-loading</strong> is now a
        10-second mobile read on a triaged Telegram thread. This is the
        workflow.
      </div>
      <div class="cta">amirkazemkhani.com</div>
    </div>
    <div class="footer">
      <div class="brand">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="page">03 / 03</div>
    </div>
  </body>
</html>
