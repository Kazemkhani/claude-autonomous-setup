<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Impact", "Arial Black", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at center, #1c1917 0%, #000 100%);
        color: #fff;
      }
      body {
        padding: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .spotlight {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1100px;
        height: 1100px;
        background: radial-gradient(
          closest-side,
          rgba(254, 240, 138, 0.18),
          transparent 70%
        );
        filter: blur(40px);
        pointer-events: none;
      }
      .banner {
        padding: 14px 0;
        background: #dc2626;
        color: #fef08a;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        text-align: center;
        border-bottom: 6px solid #fef08a;
        font-family: -apple-system, "Inter", sans-serif;
      }
      .fight {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 80px 60px;
        gap: 30px;
        position: relative;
        z-index: 1;
      }
      .fighter {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        text-align: center;
      }
      .label {
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-family: -apple-system, "Inter", sans-serif;
      }
      .fighter.gpt .label {
        color: #7dd3fc;
      }
      .fighter.claude .label {
        color: #fca5a5;
      }
      .name {
        font-size: 72px;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -0.03em;
        text-transform: uppercase;
      }
      .fighter.gpt .name {
        color: #0ea5e9;
        text-shadow: 0 0 24px rgba(14, 165, 233, 0.5);
      }
      .fighter.claude .name {
        color: #dc2626;
        text-shadow: 0 0 24px rgba(220, 38, 38, 0.5);
      }
      .tagline {
        font-size: 18px;
        color: #a8a29e;
        font-weight: 600;
        font-family: -apple-system, "Inter", sans-serif;
        font-style: italic;
        max-width: 280px;
      }
      .vs {
        font-size: 128px;
        font-weight: 900;
        color: #fef08a;
        letter-spacing: -0.05em;
        text-shadow: 0 0 40px rgba(254, 240, 138, 0.6);
      }
      .headline {
        padding: 48px 80px;
        text-align: center;
        position: relative;
        z-index: 1;
      }
      .headline h1 {
        font-size: 78px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -0.03em;
        color: #fff;
        font-family: -apple-system, "Inter", sans-serif;
        text-transform: uppercase;
      }
      .headline h1 em {
        font-style: italic;
        color: #fef08a;
        text-shadow: 0 0 24px rgba(254, 240, 138, 0.5);
      }
      .foot {
        padding: 18px 60px;
        background: #000;
        color: #525252;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        font-family: -apple-system, "Inter", sans-serif;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-top: 6px solid #fef08a;
      }
    </style>
  </head>
  <body>
    <div class="spotlight"></div>
    <div class="banner">⚡ Tonight Only · The AI Heavyweights ⚡</div>
    <div class="fight">
      <div class="fighter gpt">
        <div class="label">In the Blue Corner</div>
        <div class="name">GPT-5.5</div>
        <div class="tagline">"the reviewer"</div>
      </div>
      <div class="vs">VS</div>
      <div class="fighter claude">
        <div class="label">In the Red Corner</div>
        <div class="name">Claude<br />Opus 4.7</div>
        <div class="tagline">"the implementer"</div>
      </div>
    </div>
    <div class="headline">
      <h1>I made them<br /><em>review each other.</em></h1>
    </div>
    <div class="foot">
      <div>@amirhkazemkhani · amirkazemkhani.com</div>
      <div>SWIPE FOR THE ROUNDS →</div>
    </div>
  </body>
</html>
