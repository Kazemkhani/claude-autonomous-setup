<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
        font-family: "Space Grotesk", "Helvetica Neue", sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      .top-band {
        background: #111111;
        height: 18px;
        width: 100%;
      }
      .accent-band {
        background: #f97316;
        height: 8px;
        width: 100%;
      }
      .main {
        flex: 1;
        padding: 56px 72px 44px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .dispatch-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dispatch-label {
        font-family: "Space Mono", monospace;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #f97316;
      }
      .issue-num {
        font-family: "Space Mono", monospace;
        font-size: 14px;
        color: #999999;
        letter-spacing: 0.1em;
      }
      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 24px 0;
        gap: 28px;
      }
      .week-tag {
        font-family: "Space Mono", monospace;
        font-size: 16px;
        color: #666666;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .week-tag::before {
        content: "";
        display: inline-block;
        width: 28px;
        height: 3px;
        background: #f97316;
      }
      h1 {
        font-size: 108px;
        font-weight: 900;
        line-height: 0.88;
        letter-spacing: -0.04em;
        color: #111111;
        text-transform: uppercase;
      }
      h1 .accent {
        color: #f97316;
        display: block;
      }
      .sub {
        font-size: 24px;
        font-weight: 400;
        color: #444444;
        line-height: 1.4;
        max-width: 760px;
        padding-left: 24px;
        border-left: 5px solid #111111;
      }
      .sub strong {
        font-weight: 700;
        color: #111111;
      }
      .swipe-cta {
        background: #111111;
        color: #f97316;
        font-family: "Space Mono", monospace;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 16px 32px;
        display: inline-block;
        align-self: flex-start;
      }
      .foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 2px solid #111111;
        padding-top: 20px;
      }
      .foot-handle {
        font-family: "Space Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: #111111;
        letter-spacing: 0.04em;
      }
      .foot-page {
        font-family: "Space Mono", monospace;
        font-size: 13px;
        color: #888888;
        letter-spacing: 0.1em;
      }
      .bottom-bands {
        display: flex;
      }
      .bottom-bands .b1 {
        background: #f97316;
        height: 8px;
        flex: 1;
      }
      .bottom-bands .b2 {
        background: #111111;
        height: 8px;
        flex: 3;
      }
    </style>
  </head>
  <body>
    <div class="top-band"></div>
    <div class="accent-band"></div>
    <div class="main">
      <div class="dispatch-row">
        <div class="dispatch-label">Weekly AI Dispatch</div>
        <div class="issue-num">Issue #02 · May 12</div>
      </div>
      <div class="hero">
        <div class="week-tag">Week of May 12, 2026</div>
        <h1>
          5 AI<br />headlines.<br /><span class="accent">2 minutes.</span>
        </h1>
        <div class="sub">
          <strong>1 actually matters for ops teams.</strong><br />
          The rest is hype. I filtered it for you.
        </div>
        <div class="swipe-cta">Swipe for the breakdown →</div>
      </div>
      <div class="foot">
        <div class="foot-handle">@amirhkazemkhani · amirkazemkhani.com</div>
        <div class="foot-page">01 / 03</div>
      </div>
    </div>
    <div class="bottom-bands">
      <div class="b1"></div>
      <div class="b2"></div>
    </div>
  </body>
</html>
