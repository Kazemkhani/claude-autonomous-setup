<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, "Inter", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        background: #0a0000;
        color: #fff;
        overflow: hidden;
      }
      body {
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .glow1 {
        position: absolute;
        top: -200px;
        left: -200px;
        width: 900px;
        height: 900px;
        background: radial-gradient(
          closest-side,
          rgba(239, 68, 68, 0.4),
          transparent 70%
        );
        filter: blur(60px);
      }
      .glow2 {
        position: absolute;
        bottom: -200px;
        right: -200px;
        width: 900px;
        height: 900px;
        background: radial-gradient(
          closest-side,
          rgba(220, 38, 38, 0.35),
          transparent 70%
        );
        filter: blur(60px);
      }
      .lines {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 8px,
          rgba(239, 68, 68, 0.04) 8px,
          rgba(239, 68, 68, 0.04) 9px
        );
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        padding: 10px 22px;
        border: 2px solid #ef4444;
        border-radius: 8px;
        align-self: flex-start;
        margin-bottom: 36px;
        background: rgba(239, 68, 68, 0.08);
      }
      .eyebrow .dot {
        width: 12px;
        height: 12px;
        background: #ef4444;
        border-radius: 50%;
        box-shadow: 0 0 16px rgba(239, 68, 68, 0.8);
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        50% {
          opacity: 0.4;
        }
      }
      .eyebrow .text {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.2em;
        color: #fecaca;
        text-transform: uppercase;
      }
      h1 {
        font-size: 148px;
        font-weight: 900;
        line-height: 0.85;
        letter-spacing: -0.05em;
        text-transform: uppercase;
        color: #fff;
        margin-bottom: 32px;
      }
      h1 .red {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .sub {
        font-size: 34px;
        font-weight: 600;
        line-height: 1.3;
        color: #fecaca;
        max-width: 920px;
      }
      .sub strong {
        color: #fff;
        font-weight: 800;
      }
      .footer {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        font-size: 18px;
        color: #52525b;
      }
      .brand {
        font-weight: 700;
        color: #a1a1aa;
      }
      .swipe {
        font-weight: 800;
        color: #ef4444;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .swipe::after {
        content: " →";
        color: #fecaca;
      }
    </style>
  </head>
  <body>
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="lines"></div>
    <div class="content">
      <div class="eyebrow">
        <div class="dot"></div>
        <div class="text">Live · Limited Window</div>
      </div>
      <h1>The window<br />is <span class="red">open.</span></h1>
      <div class="sub">
        <strong>Right now.</strong> 1% of devs are wiring AI into full agent
        teams. The other 99% are still in browser tabs. The early movers
        establish the playbook.
      </div>
    </div>
    <div class="footer">
      <div class="brand">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="swipe">Swipe</div>
    </div>
  </body>
</html>
