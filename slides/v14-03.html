<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Helvetica Neue", "Inter", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      body {
        padding: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .split {
        flex: 1;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .bar-top {
        height: 16px;
        background: repeating-linear-gradient(
          90deg,
          #0ea5e9,
          #0ea5e9 30px,
          #dc2626 30px,
          #dc2626 60px
        );
      }
      .content {
        padding: 96px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        color: #fff;
      }
      .eyebrow {
        font-size: 20px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        font-weight: 900;
        color: #fbbf24;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 118px;
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        margin-bottom: 36px;
      }
      h1 .blue {
        color: #0ea5e9;
      }
      h1 .red {
        color: #dc2626;
      }
      .body {
        font-size: 28px;
        font-weight: 600;
        line-height: 1.4;
        color: #d4d4d8;
        max-width: 880px;
        margin: 0 auto 40px;
      }
      .body strong {
        color: #fff;
        font-weight: 800;
      }
      .cta {
        display: inline-flex;
        align-self: center;
        align-items: center;
        gap: 14px;
        padding: 22px 48px;
        background: #fff;
        color: #000;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border: 4px solid #fff;
      }
      .cta::after {
        content: "→";
        color: #dc2626;
      }
      .bar-bot {
        height: 16px;
        background: repeating-linear-gradient(
          90deg,
          #0ea5e9,
          #0ea5e9 30px,
          #dc2626 30px,
          #dc2626 60px
        );
      }
      .foot {
        padding: 16px 80px;
        color: #525252;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        font-weight: 700;
        letter-spacing: 0.05em;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div class="bar-top"></div>
    <div class="content">
      <div class="eyebrow">// the verdict</div>
      <h1>
        Use <span class="blue">GPT</span><br />in your IDE.<br />Use
        <span class="red">Claude</span><br />as orchestrator.
      </h1>
      <div class="body">
        <strong>Different stacks for different work.</strong> Don't argue
        tribally. Use the right tool. The hype loses.
      </div>
      <div class="cta">amirkazemkhani.com</div>
    </div>
    <div class="bar-bot"></div>
    <div class="foot">
      <div>@amirhkazemkhani · amir@amirkazemkhani.com</div>
      <div>03 / 03</div>
    </div>
  </body>
</html>
