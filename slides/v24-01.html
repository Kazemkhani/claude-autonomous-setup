<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #1e1b4b;
        font-family: "Inter", "Helvetica Neue", sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        padding: 80px 88px;
        justify-content: space-between;
        position: relative;
      }
      /* subtle noise texture via box-shadow grid */
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 80% 20%,
          rgba(99, 102, 241, 0.15) 0%,
          transparent 60%
        );
        pointer-events: none;
      }
      .tag {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #a5b4fc;
        position: relative;
        z-index: 1;
      }
      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0;
        position: relative;
        z-index: 1;
      }
      .quote-mark {
        font-size: 160px;
        font-weight: 900;
        line-height: 0.6;
        color: #312e81;
        margin-bottom: 8px;
        font-family: Georgia, serif;
      }
      h1 {
        font-size: 96px;
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -0.04em;
        color: #fafafa;
        margin-bottom: 40px;
      }
      h1 .strike {
        text-decoration: line-through;
        color: #6366f1;
        text-decoration-color: #f59e0b;
        text-decoration-thickness: 6px;
      }
      .sub {
        font-size: 28px;
        font-weight: 300;
        color: #a5b4fc;
        line-height: 1.4;
        max-width: 780px;
        border-left: 4px solid #f59e0b;
        padding-left: 28px;
      }
      .sub strong {
        color: #fafafa;
        font-weight: 700;
      }
      .swipe-cue {
        margin-top: 48px;
        display: inline-flex;
        align-items: center;
        gap: 16px;
        background: #f59e0b;
        color: #1e1b4b;
        padding: 16px 32px;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        z-index: 1;
        border-top: 1px solid #312e81;
        padding-top: 24px;
      }
      .foot-handle {
        font-size: 14px;
        font-weight: 700;
        color: #6366f1;
        letter-spacing: 0.05em;
      }
      .foot-page {
        font-size: 14px;
        color: #4338ca;
        letter-spacing: 0.1em;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="tag">Hot Take · AI Founders · 2026</div>
    <div class="hero">
      <div class="quote-mark">"</div>
      <h1>Move<br /><span class="strike">fast.</span><br />Wrong.</h1>
      <div class="sub">
        The advice that built social apps is
        <strong>actively harmful</strong> for AI founders in 2026.<br />
        Here's what I do instead. Swipe.
      </div>
      <div class="swipe-cue">5 contrarian stances →</div>
    </div>
    <div class="foot">
      <div class="foot-handle">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="foot-page">01 / 03</div>
    </div>
  </body>
</html>
