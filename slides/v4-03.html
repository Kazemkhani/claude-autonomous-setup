<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, "Inter", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        background: #000;
        color: #fff;
        overflow: hidden;
      }
      body {
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .bg-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(34, 197, 94, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(34, 197, 94, 0.07) 1px, transparent 1px);
        background-size: 36px 36px;
      }
      .glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1100px;
        height: 1100px;
        background: radial-gradient(
          closest-side,
          rgba(34, 197, 94, 0.25),
          transparent 70%
        );
        filter: blur(50px);
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      .eyebrow {
        font-size: 22px;
        color: #86efac;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 700;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 108px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -0.04em;
        margin-bottom: 36px;
        color: #fff;
      }
      h1 span {
        display: block;
        background: linear-gradient(135deg, #22c55e, #86efac);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .body {
        font-size: 30px;
        color: #86efac;
        font-weight: 500;
        line-height: 1.4;
        max-width: 880px;
        margin: 0 auto 48px;
      }
      .body strong {
        color: #fff;
      }
      .cta {
        display: inline-flex;
        align-self: center;
        padding: 24px 52px;
        background: #22c55e;
        color: #000;
        border-radius: 12px;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 0.04em;
        box-shadow: 0 0 60px rgba(34, 197, 94, 0.5);
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
      }
      .footer {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        font-size: 18px;
        color: #3f3f46;
      }
      .brand {
        font-weight: 700;
        color: #71717a;
      }
      .page {
        font-weight: 700;
        color: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="glow"></div>
    <div class="content">
      <div class="eyebrow">// the unfair advantage</div>
      <h1>Solo builders<span>ship like teams.</span></h1>
      <div class="body">
        <strong>This is the unfair advantage of 2026.</strong><br />The tools
        are public. The architecture is documented. The cost is zero.
      </div>
      <div class="cta">→ get the guide</div>
    </div>
    <div class="footer">
      <div class="brand">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="page">03 / 03</div>
    </div>
  </body>
</html>
