<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Helvetica Neue",
          -apple-system,
          "Inter",
          sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
      }
      body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        position: relative;
      }
      .left {
        background: #000;
        color: #fff;
        padding: 80px 60px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        border-right: 6px solid #fff;
      }
      .right {
        background: #fff;
        color: #000;
        padding: 80px 60px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .label {
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 24px;
      }
      .left .label {
        color: #0ea5e9;
      }
      .right .label {
        color: #dc2626;
      }
      .title {
        font-size: 96px;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -0.05em;
        text-transform: uppercase;
      }
      .left .title {
        color: #fff;
      }
      .right .title {
        color: #000;
      }
      .tag {
        font-size: 18px;
        line-height: 1.4;
        font-weight: 600;
        margin-top: 24px;
      }
      .left .tag {
        color: #94a3b8;
      }
      .right .tag {
        color: #525252;
      }
      .divider-tag {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-3deg);
        background: #fbbf24;
        color: #000;
        padding: 18px 32px;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border: 4px solid #000;
        box-shadow: 8px 8px 0 #000;
        z-index: 2;
      }
      .foot {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.06em;
      }
      .left .foot {
        color: #475569;
      }
      .right .foot {
        color: #737373;
      }
    </style>
  </head>
  <body>
    <div class="left">
      <div>
        <div class="label">// hype</div>
        <div class="title">GPT-5.5<br />kills<br />Claude.</div>
        <div class="tag">— what the timeline said 11 days ago.</div>
      </div>
      <div class="foot">@amirhkazemkhani</div>
    </div>
    <div class="right">
      <div>
        <div class="label">// reality</div>
        <div class="title">I tested<br />both<br />5 days.</div>
        <div class="tag">Real production. 9 agents. Real verdict inside.</div>
      </div>
      <div class="foot">amirkazemkhani.com</div>
    </div>
    <div class="divider-tag">vs</div>
  </body>
</html>
