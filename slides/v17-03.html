<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Impact", "Arial Black", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at center, #1c1917 0%, #000 100%);
        color: #fff;
      }
      body {
        padding: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .spotlight {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1200px;
        height: 1200px;
        background: radial-gradient(
          closest-side,
          rgba(254, 240, 138, 0.22),
          transparent 70%
        );
        filter: blur(40px);
        pointer-events: none;
      }
      .banner {
        padding: 14px 0;
        background: #fef08a;
        color: #1c1917;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        text-align: center;
        border-bottom: 6px solid #dc2626;
        font-family: -apple-system, "Inter", sans-serif;
      }
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        padding: 80px 80px;
        position: relative;
        z-index: 1;
      }
      .eyebrow {
        font-size: 22px;
        color: #fef08a;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-weight: 900;
        margin-bottom: 32px;
        font-family: -apple-system, "Inter", sans-serif;
      }
      h1 {
        font-size: 140px;
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        color: #fff;
        margin-bottom: 32px;
        text-shadow: 0 0 40px rgba(254, 240, 138, 0.3);
      }
      h1 em {
        font-style: italic;
        color: #fef08a;
        text-shadow: 0 0 40px rgba(254, 240, 138, 0.5);
      }
      .body {
        font-size: 30px;
        color: #d6d3d1;
        font-weight: 600;
        line-height: 1.45;
        max-width: 880px;
        margin: 0 auto 56px;
        font-family: -apple-system, "Inter", sans-serif;
        font-style: italic;
      }
      .body strong {
        color: #fff;
        font-style: normal;
      }
      .cta {
        display: inline-flex;
        align-self: center;
        align-items: center;
        gap: 14px;
        padding: 24px 52px;
        background: #fef08a;
        color: #1c1917;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-family: -apple-system, "Inter", sans-serif;
        box-shadow: 0 0 80px rgba(254, 240, 138, 0.5);
      }
      .cta::after {
        content: "→";
        color: #dc2626;
      }
      .foot {
        padding: 18px 60px;
        background: #000;
        color: #525252;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        font-family: -apple-system, "Inter", sans-serif;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-top: 6px solid #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="spotlight"></div>
    <div class="banner">⚡ Final Verdict ⚡</div>
    <div class="content">
      <div class="eyebrow">// they're not redundant</div>
      <h1>They're<br /><em>complementary.</em></h1>
      <div class="body">
        <strong>Your AI team should have BOTH.</strong> Claude as the
        implementer. GPT as the reviewer. The future is multi-model. Stop
        arguing tribally.
      </div>
      <div class="cta">Run the experiment</div>
    </div>
    <div class="foot">
      <div>@amirhkazemkhani · amirkazemkhani.com</div>
      <div>03 / 03</div>
    </div>
  </body>
</html>
