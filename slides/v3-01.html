<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, "Inter", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        background: #0a0510;
        color: #fff;
        overflow: hidden;
      }
      body {
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .glow1 {
        position: absolute;
        top: -100px;
        left: -100px;
        width: 700px;
        height: 700px;
        background: radial-gradient(
          closest-side,
          rgba(245, 158, 11, 0.35),
          transparent 70%
        );
        filter: blur(50px);
      }
      .glow2 {
        position: absolute;
        bottom: -100px;
        right: -100px;
        width: 700px;
        height: 700px;
        background: radial-gradient(
          closest-side,
          rgba(249, 115, 22, 0.3),
          transparent 70%
        );
        filter: blur(50px);
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .eyebrow {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #f59e0b;
        text-transform: uppercase;
        margin-bottom: 32px;
      }
      h1 {
        font-size: 144px;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -0.05em;
        color: #fff;
        margin-bottom: 36px;
        font-style: italic;
      }
      h1 span {
        background: linear-gradient(135deg, #f59e0b, #f97316, #dc2626);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-style: normal;
      }
      .sub {
        font-size: 34px;
        font-weight: 500;
        line-height: 1.3;
        color: #fed7aa;
        max-width: 920px;
      }
      .waveform {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 6px;
        height: 64px;
        margin: 48px 0;
      }
      .bar {
        width: 6px;
        background: linear-gradient(180deg, #f59e0b, #dc2626);
        border-radius: 3px;
      }
      .footer {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        font-size: 18px;
        color: #52525b;
      }
      .brand {
        font-weight: 700;
        color: #a1a1aa;
      }
      .swipe {
        font-weight: 600;
        color: #f59e0b;
      }
      .swipe::after {
        content: " →";
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="content">
      <div class="eyebrow">CHAPTER 03 · Voice</div>
      <h1>I haven't<br /><span>typed code</span><br />today.</h1>
      <div class="waveform">
        <div class="bar" style="height: 20px"></div>
        <div class="bar" style="height: 42px"></div>
        <div class="bar" style="height: 64px"></div>
        <div class="bar" style="height: 48px"></div>
        <div class="bar" style="height: 32px"></div>
        <div class="bar" style="height: 56px"></div>
        <div class="bar" style="height: 24px"></div>
        <div class="bar" style="height: 60px"></div>
        <div class="bar" style="height: 36px"></div>
        <div class="bar" style="height: 50px"></div>
        <div class="bar" style="height: 18px"></div>
        <div class="bar" style="height: 64px"></div>
        <div class="bar" style="height: 30px"></div>
        <div class="bar" style="height: 42px"></div>
        <div class="bar" style="height: 54px"></div>
        <div class="bar" style="height: 24px"></div>
        <div class="bar" style="height: 46px"></div>
        <div class="bar" style="height: 60px"></div>
      </div>
      <div class="sub">
        I voice-messaged it. From the gym. From traffic. From a coffee shop in
        Abu Dhabi. AirPods + Telegram + Claude = my dev environment.
      </div>
    </div>
    <div class="footer">
      <div class="brand">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="swipe">Swipe</div>
    </div>
  </body>
</html>
