<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
        font-family: "Space Grotesk", "Helvetica Neue", sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        padding: 0;
      }
      .top-bar {
        background: #111111;
        height: 12px;
        width: 100%;
      }
      .accent-bar {
        background: #e11d48;
        height: 6px;
        width: 100%;
      }
      .main {
        flex: 1;
        padding: 64px 72px 48px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .dispatch-label {
        font-family: "Space Mono", monospace;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #e11d48;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .dispatch-label::after {
        content: "";
        flex: 1;
        height: 2px;
        background: #111111;
        max-width: 300px;
      }
      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 32px 0;
      }
      .kicker {
        font-family: "Space Mono", monospace;
        font-size: 17px;
        color: #666666;
        letter-spacing: 0.05em;
        margin-bottom: 24px;
        text-transform: uppercase;
      }
      h1 {
        font-size: 112px;
        font-weight: 900;
        line-height: 0.88;
        letter-spacing: -0.04em;
        color: #111111;
        text-transform: uppercase;
        margin-bottom: 32px;
      }
      h1 .accent {
        color: #e11d48;
        display: block;
      }
      .sub {
        font-size: 26px;
        font-weight: 400;
        color: #444444;
        line-height: 1.4;
        max-width: 820px;
        border-left: 5px solid #e11d48;
        padding-left: 24px;
      }
      .sub strong {
        font-weight: 700;
        color: #111111;
      }
      .swipe-prompt {
        font-family: "Space Mono", monospace;
        font-size: 18px;
        font-weight: 700;
        color: #111111;
        background: #e11d48;
        display: inline-block;
        padding: 14px 28px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        align-self: flex-start;
        margin-top: 32px;
      }
      .foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 2px solid #111111;
        padding-top: 24px;
      }
      .foot-handle {
        font-family: "Space Mono", monospace;
        font-size: 14px;
        font-weight: 700;
        color: #111111;
        letter-spacing: 0.05em;
      }
      .foot-page {
        font-family: "Space Mono", monospace;
        font-size: 14px;
        color: #666666;
        letter-spacing: 0.1em;
      }
      .bottom-bars {
        display: flex;
      }
      .bottom-bars .b1 {
        background: #111111;
        height: 8px;
        flex: 3;
      }
      .bottom-bars .b2 {
        background: #e11d48;
        height: 8px;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="top-bar"></div>
    <div class="accent-bar"></div>
    <div class="main">
      <div class="dispatch-label">Weekly Dispatch — AI Edition</div>
      <div class="hero">
        <div class="kicker">Week of May 5, 2026</div>
        <h1>
          5 AI<br />headlines.<br /><span class="accent">2 minutes.</span>
        </h1>
        <div class="sub">
          The one that <strong>actually matters for sales teams.</strong><br />
          Everything else is noise.
        </div>
        <div class="swipe-prompt">Swipe for the breakdown →</div>
      </div>
      <div class="foot">
        <div class="foot-handle">@amirhkazemkhani · amirkazemkhani.com</div>
        <div class="foot-page">01 / 03</div>
      </div>
    </div>
    <div class="bottom-bars">
      <div class="b1"></div>
      <div class="b2"></div>
    </div>
  </body>
</html>
