<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Courier New", "SF Mono", monospace;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        background: #fef9e7;
        color: #1c1917;
        overflow: hidden;
      }
      body {
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .paper {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 30px,
          rgba(28, 25, 23, 0.04) 30px,
          rgba(28, 25, 23, 0.04) 31px
        );
      }
      .staple {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 8px;
        background: #a8a29e;
        border-radius: 2px;
        box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15);
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-top: 32px;
      }
      .header {
        font-size: 22px;
        color: #78716c;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        margin-bottom: 18px;
        font-weight: 700;
      }
      h1 {
        font-size: 88px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -0.04em;
        color: #1c1917;
        margin-bottom: 24px;
        font-family: -apple-system, "Inter", sans-serif;
        text-transform: uppercase;
      }
      h1 .red {
        color: #dc2626;
        text-decoration: line-through;
        text-decoration-thickness: 6px;
      }
      .sub {
        font-size: 30px;
        font-weight: 600;
        line-height: 1.4;
        color: #44403c;
        max-width: 880px;
        font-family: -apple-system, "Inter", sans-serif;
      }
      .sub strong {
        color: #dc2626;
      }
      .divider {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 36px 0;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #a8a29e;
        background-image: repeating-linear-gradient(
          90deg,
          #a8a29e,
          #a8a29e 6px,
          transparent 6px,
          transparent 12px
        );
      }
      .divider span {
        font-size: 14px;
        color: #78716c;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-weight: 700;
      }
      .savings {
        font-size: 28px;
        color: #15803d;
        font-weight: 800;
        letter-spacing: 0.04em;
        font-family: -apple-system, "Inter", sans-serif;
      }
      .savings em {
        font-style: normal;
        color: #dc2626;
      }
      .footer {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        color: #78716c;
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .swipe {
        font-weight: 700;
        color: #dc2626;
        letter-spacing: 0.05em;
      }
      .swipe::after {
        content: " →";
      }
    </style>
  </head>
  <body>
    <div class="paper"></div>
    <div class="staple"></div>
    <div class="content">
      <div class="header">// receipt #2026-05-12 — personal cuts</div>
      <h1>5 AI tools<br />I'm <span class="red">cancelling.</span></h1>
      <div class="sub">
        Hot take from someone who actually used them.
        <strong>Not anti-tool. Anti-redundancy.</strong>
      </div>
      <div class="divider"><span>itemized inside</span></div>
      <div class="savings">Estimated savings: <em>$180/mo</em></div>
    </div>
    <div class="footer">
      <div class="brand">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="swipe">Swipe</div>
    </div>
  </body>
</html>
