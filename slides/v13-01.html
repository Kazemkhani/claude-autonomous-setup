<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        background: #fdf6e3;
        color: #3a2818;
        overflow: hidden;
        font-family: "Times New Roman", "Garamond", Georgia, serif;
      }
      body {
        padding: 96px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .paper {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          rgba(120, 90, 30, 0.08) 1px,
          transparent 1px
        );
        background-size: 18px 18px;
      }
      .ornament {
        position: absolute;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 36px;
        color: #a16207;
        letter-spacing: 1em;
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-top: 80px;
      }
      .eyebrow {
        font-size: 18px;
        color: #a16207;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        font-weight: 700;
        margin-bottom: 32px;
        font-family: -apple-system, "Inter", sans-serif;
        text-align: center;
      }
      .eyebrow::before,
      .eyebrow::after {
        content: "——";
        color: #a16207;
        margin: 0 14px;
      }
      h1 {
        font-size: 124px;
        font-weight: 700;
        line-height: 0.95;
        letter-spacing: -0.03em;
        color: #1a1814;
        margin-bottom: 32px;
        text-align: center;
      }
      h1 em {
        font-style: italic;
        color: #a16207;
      }
      .dek {
        font-size: 30px;
        color: #78350f;
        font-style: italic;
        line-height: 1.4;
        max-width: 880px;
        font-weight: 400;
        text-align: center;
        margin: 0 auto;
      }
      .dek strong {
        color: #1a1814;
        font-weight: 700;
        font-style: normal;
      }
      .divider {
        margin: 48px auto 0;
        width: 120px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #a16207, transparent);
      }
      .byline {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        font-size: 14px;
        color: #78350f;
        font-family: -apple-system, "Inter", sans-serif;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .brand {
        color: #a16207;
      }
      .swipe {
        color: #1a1814;
      }
      .swipe::after {
        content: " — →";
      }
    </style>
  </head>
  <body>
    <div class="paper"></div>
    <div class="ornament">❧ ❧ ❧</div>
    <div class="content">
      <div class="eyebrow">A Sunday Read</div>
      <h1>The <em>economics</em><br />of solo<br />plus AI.</h1>
      <div class="dek">
        Same output. <strong>~70x cost gap.</strong> The era of expensive
        software is dying because expensive labor is no longer required to ship
        it.
      </div>
      <div class="divider"></div>
    </div>
    <div class="byline">
      <div class="brand">By Amir Hossein Kazemkhani · amirkazemkhani.com</div>
      <div class="swipe">Continue</div>
    </div>
  </body>
</html>
