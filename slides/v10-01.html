<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, "Inter", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        background: #0a0014;
        color: #fff;
        overflow: hidden;
      }
      body {
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .bg-pink {
        position: absolute;
        top: -150px;
        left: -150px;
        width: 800px;
        height: 800px;
        background: radial-gradient(
          closest-side,
          rgba(236, 72, 153, 0.5),
          transparent 70%
        );
        filter: blur(60px);
      }
      .bg-purple {
        position: absolute;
        bottom: -150px;
        right: -150px;
        width: 800px;
        height: 800px;
        background: radial-gradient(
          closest-side,
          rgba(168, 85, 247, 0.45),
          transparent 70%
        );
        filter: blur(60px);
      }
      .bg-yellow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(
          closest-side,
          rgba(251, 191, 36, 0.18),
          transparent 70%
        );
        filter: blur(40px);
      }
      .scanlines {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 4px,
          rgba(255, 255, 255, 0.02) 4px,
          rgba(255, 255, 255, 0.02) 5px
        );
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .eyebrow {
        display: inline-flex;
        align-self: flex-start;
        align-items: center;
        gap: 14px;
        padding: 12px 24px;
        border-radius: 999px;
        background: rgba(236, 72, 153, 0.2);
        border: 2px solid #ec4899;
        color: #fbcfe8;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 32px;
        text-shadow: 0 0 20px rgba(236, 72, 153, 0.6);
      }
      h1 {
        font-size: 172px;
        font-weight: 900;
        line-height: 0.85;
        letter-spacing: -0.05em;
        text-transform: uppercase;
        color: #fff;
        margin-bottom: 32px;
        text-shadow: 0 0 60px rgba(236, 72, 153, 0.5);
      }
      h1 .pink {
        background: linear-gradient(135deg, #ec4899, #f59e0b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: none;
      }
      h1 .purple {
        background: linear-gradient(135deg, #a855f7, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: none;
      }
      .sub {
        font-size: 32px;
        font-weight: 600;
        line-height: 1.3;
        color: #fbcfe8;
        max-width: 920px;
      }
      .sub strong {
        color: #fff;
        font-weight: 800;
        background: linear-gradient(135deg, #fbbf24, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .footer {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        font-size: 18px;
        color: #a78bfa;
      }
      .brand {
        font-weight: 700;
        color: #fbcfe8;
      }
      .swipe {
        font-weight: 900;
        color: #fbbf24;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
      }
      .swipe::after {
        content: " →";
      }
    </style>
  </head>
  <body>
    <div class="bg-pink"></div>
    <div class="bg-purple"></div>
    <div class="bg-yellow"></div>
    <div class="scanlines"></div>
    <div class="content">
      <div class="eyebrow">🔥 dangerous experiment</div>
      <h1>
        I asked Claude<br />to <span class="pink">roast</span><br />my
        <span class="purple">codebase.</span>
      </h1>
      <div class="sub">
        <strong>It hurt.</strong> But the AI has no ego. So it said the things
        my senior dev wouldn't.
      </div>
    </div>
    <div class="footer">
      <div class="brand">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="swipe">Greatest hits</div>
    </div>
  </body>
</html>
