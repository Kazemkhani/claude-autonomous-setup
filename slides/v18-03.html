<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Helvetica Neue Condensed", "Arial Narrow", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #facc15;
        color: #0a0a0a;
      }
      body {
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .noise {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.04) 2px,
          rgba(0, 0, 0, 0.04) 3px
        );
        pointer-events: none;
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .eyebrow {
        font-family: -apple-system, "Inter", sans-serif;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: #dc2626;
        margin-bottom: 24px;
      }
      .eyebrow::before {
        content: "// ";
      }
      h1 {
        font-size: 200px;
        font-weight: 900;
        line-height: 0.85;
        letter-spacing: -0.06em;
        color: #0a0a0a;
        margin-bottom: 32px;
        text-transform: uppercase;
      }
      h1 em {
        font-style: italic;
        color: #dc2626;
        display: block;
      }
      .body {
        font-size: 32px;
        font-weight: 700;
        line-height: 1.35;
        color: #0a0a0a;
        font-family: -apple-system, "Inter", sans-serif;
        max-width: 880px;
        margin-bottom: 48px;
        text-transform: uppercase;
        letter-spacing: -0.01em;
      }
      .body strong {
        color: #dc2626;
      }
      .cta {
        display: inline-flex;
        align-self: flex-start;
        align-items: center;
        gap: 14px;
        padding: 22px 44px;
        background: #0a0a0a;
        color: #facc15;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-family: -apple-system, "Inter", sans-serif;
        border: 6px solid #0a0a0a;
        box-shadow: 8px 8px 0 #dc2626;
      }
      .cta::after {
        content: "→";
        color: #dc2626;
      }
      .foot {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        color: #0a0a0a;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-family: -apple-system, "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="content">
      <div class="eyebrow">the year of solo</div>
      <h1>I am<em>one of them.</em></h1>
      <div class="body">
        Solo founders are <strong>eating teams' lunch</strong> right now. Not
        because they're smarter. Because they ditched alignment overhead.
      </div>
      <div class="cta">amirkazemkhani.com</div>
    </div>
    <div class="foot">
      <div>@amirhkazemkhani</div>
      <div>03 / 03</div>
    </div>
  </body>
</html>
