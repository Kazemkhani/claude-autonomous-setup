<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, "Inter", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        background: #0a0014;
        color: #fff;
        overflow: hidden;
      }
      body {
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .bg-pink {
        position: absolute;
        top: -100px;
        right: -100px;
        width: 700px;
        height: 700px;
        background: radial-gradient(
          closest-side,
          rgba(236, 72, 153, 0.55),
          transparent 70%
        );
        filter: blur(60px);
      }
      .bg-yellow {
        position: absolute;
        bottom: -100px;
        left: -100px;
        width: 700px;
        height: 700px;
        background: radial-gradient(
          closest-side,
          rgba(251, 191, 36, 0.45),
          transparent 70%
        );
        filter: blur(60px);
      }
      .scanlines {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 4px,
          rgba(255, 255, 255, 0.02) 4px,
          rgba(255, 255, 255, 0.02) 5px
        );
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      .eyebrow {
        font-size: 22px;
        color: #fbbf24;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 900;
        margin-bottom: 24px;
        text-shadow: 0 0 16px rgba(251, 191, 36, 0.5);
      }
      h1 {
        font-size: 140px;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -0.05em;
        margin-bottom: 36px;
        color: #fff;
        text-transform: uppercase;
      }
      h1 .stack {
        display: block;
        background: linear-gradient(135deg, #ec4899, #fbbf24);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .body {
        font-size: 30px;
        color: #fbcfe8;
        font-weight: 600;
        line-height: 1.4;
        max-width: 880px;
        margin: 0 auto 56px;
      }
      .body strong {
        color: #fff;
        font-weight: 800;
      }
      .cta {
        display: inline-flex;
        align-self: center;
        align-items: center;
        gap: 14px;
        padding: 24px 52px;
        background: linear-gradient(135deg, #ec4899, #fbbf24);
        color: #0a0014;
        border-radius: 14px;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 0.04em;
        box-shadow: 0 0 80px rgba(236, 72, 153, 0.6);
        text-transform: uppercase;
      }
      .cta::after {
        content: "→";
      }
      .footer {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        font-size: 16px;
        color: #a78bfa;
      }
      .brand {
        font-weight: 700;
        color: #fbcfe8;
      }
      .page {
        font-weight: 900;
        color: #fbbf24;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div class="bg-pink"></div>
    <div class="bg-yellow"></div>
    <div class="scanlines"></div>
    <div class="content">
      <div class="eyebrow">your turn</div>
      <h1>
        Run this.<span class="stack">Tag me when</span
        ><span class="stack">it hurts.</span>
      </h1>
      <div class="body">
        <strong>Open Claude Code.</strong> Drop into your messy repo. Say:
        "roast this codebase like a senior at a code review."<br />Brace.
      </div>
      <div class="cta">amirkazemkhani.com</div>
    </div>
    <div class="footer">
      <div class="brand">@amirhkazemkhani · amirkazemkhani.com</div>
      <div class="page">03 / 03</div>
    </div>
  </body>
</html>
