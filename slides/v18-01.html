<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Helvetica Neue Condensed", "Arial Narrow", sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #facc15;
        color: #0a0a0a;
      }
      body {
        padding: 64px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .noise {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.04) 2px,
          rgba(0, 0, 0, 0.04) 3px
        );
        pointer-events: none;
      }
      .tape {
        position: absolute;
        top: 30px;
        left: -20px;
        background: #0a0a0a;
        color: #facc15;
        padding: 10px 60px;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        transform: rotate(-3deg);
        font-family: -apple-system, "Inter", sans-serif;
      }
      .content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-top: 48px;
      }
      h1 {
        font-size: 240px;
        font-weight: 900;
        line-height: 0.85;
        letter-spacing: -0.06em;
        color: #0a0a0a;
        text-transform: uppercase;
      }
      h1 .stretch {
        font-stretch: condensed;
        letter-spacing: -0.04em;
      }
      h1 em {
        font-style: italic;
        color: #dc2626;
      }
      .line {
        height: 8px;
        background: #0a0a0a;
        margin: 24px 0;
        width: 100%;
      }
      .body {
        font-size: 36px;
        font-weight: 800;
        line-height: 1.2;
        color: #0a0a0a;
        font-family: -apple-system, "Inter", sans-serif;
        text-transform: uppercase;
        letter-spacing: -0.01em;
        max-width: 920px;
      }
      .body span {
        color: #dc2626;
      }
      .foot {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        color: #0a0a0a;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-family: -apple-system, "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="tape">// solo founder dispatch · #018</div>
    <div class="content">
      <h1>Solo<br /><em>out-ships</em><br />10.</h1>
      <div class="line"></div>
      <div class="body">
        Same output. <span>One-tenth</span> the cost.<br />The math is brutal.
        Inside.
      </div>
    </div>
    <div class="foot">
      <div>@amirhkazemkhani · amirkazemkhani.com</div>
      <div>SWIPE →</div>
    </div>
  </body>
</html>
